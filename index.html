<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piquant Chilli Sauce | Keep It Hot As Goosebumps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header" id="main-header">
    <div class="container">
        <nav class="nav">
            <div class="logo-container">
                <img src="Images/Fav Logo.jpg" alt="Piquant Chilli Sauce Logo">
                <span class="logo">Piquant Chilli Sauce</span>
            </div>

            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="Sauces.html">Sauces</a></li>
                <li><a href="Catering.html">Catering</a></li>
                <li><a href="Merch.html">Merch</a></li>
            </ul>

            <a href="Cart.html" class="cta-button">Cart</a>

            <button id="header-toggle" class="header-toggle" aria-label="Menu">
                ☰
            </button>
        </nav>
    </div>
</header>

<section class="profile">
    <div class="container">
        <img src="Images/Fav Logo.jpg" alt="Logo" class="hero-logo">
        <div class="profile-logo">Piquant Chilli Sauce</div>
        <h1>Keep It Hot As Goosebumps</h1>
    </div>
</section>

<section class="news-div">
    <p>This is where website news and announcements will appear.</p>
</section>

<section class="sauce-section">
    <div class="container">
        <h2 class="section-title">Sauces</h2>

        <div class="sauce-grid">
            <div class="sauce-card">
                <img src="Images/Load.jpg" alt="250ml Sauce">
                <p>250ml</p>
                <p>R50.00</p>
            </div>

            <div class="sauce-card">
                <img src="Images/Load.jpg" alt="50ml Sauce">
                <p>50ml</p>
                <p>R20.00</p>
            </div>

            <div class="sauce-card">
                <img src="Images/Load.jpg" alt="Sauce">
                <p>R50.00</p>
            </div>

            <div class="sauce-card">
                <img src="Images/Load.jpg" alt="Sauce">
                <p>R50.00</p>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <nav class="nav-footer">
            <ul class="nav-menu">
                <li><a href="About.html">About</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</footer>

<script>
const header = document.getElementById('main-header');
const toggleBtn = document.getElementById('header-toggle');

window.addEventListener('scroll', () => {
    if (window.scrollY > 80) {
        header.classList.add('minimized');
    } else {
        header.classList.remove('minimized');
        header.classList.remove('expanded');
    }
});

toggleBtn.addEventListener('click', () => {
    header.classList.toggle('expanded');
});

document.addEventListener('click', (e) => {
    if (
        header.classList.contains('expanded') &&
        !header.contains(e.target)
    ) {
        header.classList.remove('expanded');
    }
});
</script>

</body>
</html>
