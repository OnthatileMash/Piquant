            // Replace logo text with image + text after DOM loads
            window.addEventListener('DOMContentLoaded', function() {
                const logo = document.querySelector('.logo');
                if (logo) {
                    const container = document.createElement('span');
                    container.className = 'logo-container';
                    const img = document.createElement('img');
                    img.src = 'Images/Fav Logo.jpg';
                    img.alt = 'Piquant Chilli Sauce Logo';
                    container.appendChild(img);
                    const text = document.createElement('span');
                    text.innerHTML = logo.innerHTML;
                    container.appendChild(text);
                    logo.innerHTML = '';
                    logo.appendChild(container);
                }
            });
            // Minimize header on scroll and show toggle icon with smooth transitions
            const header = document.getElementById('main-header');
            const toggleBtn = document.getElementById('header-toggle');
            let minimized = false;
            window.addEventListener('scroll', function() {
                if (window.scrollY > 80 && !minimized) {
                    header.classList.add('minimized');
                    header.classList.remove('expanded');
                    minimized = true;
                } else if (window.scrollY <= 80 && minimized) {
                    header.classList.remove('minimized');
                    header.classList.remove('expanded');
                    minimized = false;
                }
            });
            toggleBtn.addEventListener('click', function() {
                header.classList.remove('minimized');
                header.classList.add('expanded');
            });
            document.addEventListener('click', function(e) {
                if (header.classList.contains('expanded') && !header.contains(e.target)) {
                    header.classList.remove('expanded');
                    header.classList.add('minimized');
                }
            });
            // Simple scroll animations
            function animateOnScroll() {
                const elements = document.querySelectorAll('.problem-card, .process-step, .testimonial');
                elements.forEach(element => {
                    const elementTop = element.getBoundingClientRect().top;
                    const windowHeight = window.innerHeight;
                    if (elementTop < windowHeight - 100) {
                        element.style.opacity = '1';
                        element.style.transform = 'translateY(0)';
                        element.style.transition = 'all 0.6s ease-out';
                    } else {
                        element.style.opacity = '0';
                        element.style.transform = 'translateY(30px)';
                    }
                });
            }
            window.addEventListener('scroll', animateOnScroll);
            window.addEventListener('load', animateOnScroll);
            // Smooth scrolling for navigation links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        </script>
